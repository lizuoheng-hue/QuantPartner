services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quantpartner
      POSTGRES_PASSWORD: quantpartner
      POSTGRES_DB: quantpartner
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantpartner"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://quantpartner:quantpartner@postgres:5432/quantpartner}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      APP_ENV: ${APP_ENV:-development}
    ports:
      - "8000:8000"
    volumes:
      - market_data_cache:/app/data/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: ["python", "-m", "app.worker"]
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://quantpartner:quantpartner@postgres:5432/quantpartner}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      APP_ENV: ${APP_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - market_data_cache:/app/data/cache

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  market_data_cache:
